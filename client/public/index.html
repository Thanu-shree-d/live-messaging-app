<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0b141a; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .app { width: 400px; height: 90vh; background: #111b21; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #202c33; padding: 16px; color: #e9edef; }
        .header h3 { font-size: 16px; }
        .header p { font-size: 13px; color: #00a884; }
        .messages { flex: 1; padding: 12px; overflow-y: auto; background: #0b141a; }
        .msg { display: flex; margin-bottom: 6px; }
        .msg.sent { justify-content: flex-end; }
        .msg.received { justify-content: flex-start; }
        .bubble { padding: 8px 12px; border-radius: 8px; max-width: 70%; color: #e9edef; word-wrap: break-word; }
        .sent .bubble { background: #005c4b; border-top-right-radius: 0; }
        .received .bubble { background: #202c33; border-top-left-radius: 0; }
        .name { font-size: 12px; color: #00a884; font-weight: 600; margin-bottom: 2px; }
        .time { font-size: 11px; color: #8696a0; margin-top: 4px; text-align: right; }
        .input-area { display: flex; padding: 10px; background: #202c33; gap: 8px; }
        #msgInput { flex: 1; background: #2a3942; border: none; color: #e9edef; padding: 10px 14px; border-radius: 8px; outline: none; }
        #sendBtn { background: #00a884; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        .login { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; }
        .login-box { background: #202c33; padding: 24px; border-radius: 8px; text-align: center; }
        .login-box h2 { color: #e9edef; margin-bottom: 16px; }
        .login-box input { background: #2a3942; border: none; color: #e9edef; padding: 10px; border-radius: 6px; width: 200px; margin-bottom: 12px; }
        .login-box button { background: #00a884; border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login" id="login">
        <div class="login-box">
            <h2>Enter Your Name</h2>
            <input type="text" id="nameInput" placeholder="Name" onkeypress="if(event.key==='Enter') startChat()">
            <br>
            <button onclick="startChat()">Start Chat</button>
        </div>
    </div>

    <div class="app" id="app" style="display:none;">
        <div class="header">
            <h3 id="chatTitle">Chat</h3>
            <p>● Online</p>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Type a message" onkeypress="if(event.key==='Enter') sendMsg()">
            <button id="sendBtn" onclick="sendMsg()">➤</button>
        </div>
    </div>

<script>
    let myName = '';
    let allMessages = [];
    const channel = new BroadcastChannel('chat');
    
    function startChat() {
        myName = document.getElementById('nameInput').value.trim();
        if (!myName) myName = 'User' + Math.floor(Math.random() * 1000);
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('chatTitle').textContent = myName;
        loadMsgs();
        document.getElementById('msgInput').focus();
    }

    function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        const msg = {
            id: Date.now() + Math.random(),
            text: text,
            sender: myName,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        };

        allMessages.push(msg);
        saveMsgs();
        renderMsg(msg);
        channel.postMessage({type: 'new', msg: msg});
        input.value = '';
    }

    function renderMsg(msg) {
        const isMe = msg.sender === myName;
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'sent' : 'received'}`;
        div.innerHTML = `
            <div class="bubble">
                ${!isMe ? `<div class="name">${msg.sender}</div>` : ''}
                ${msg.text}
                <div class="time">${msg.time}</div>
            </div>
        `;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function loadMsgs() {
        const saved = localStorage.getItem('chatMsgs');
        if (saved) {
            allMessages = JSON.parse(saved);
            document.getElementById('messages').innerHTML = '';
            allMessages.forEach(renderMsg);
        }
    }

    function saveMsgs() {
        localStorage.setItem('chatMsgs', JSON.stringify(allMessages));
    }

    channel.onmessage = (e) => {
        if (e.data.type === 'new') {
            allMessages.push(e.data.msg);
            saveMsgs();
            renderMsg(e.data.msg);
        }
    };
</script>
</body>
</html>
